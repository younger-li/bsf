<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑水虻种虫养殖及虫卵孵化生产管理系统</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af',
                        secondary: '#0f172a',
                        accent: '#3b82f6',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        light: '#f8fafc',
                        dark: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .transition-all {
                transition-property: all;
                transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
                transition-duration: 150ms;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <!-- 顶部导航栏 -->
    <nav class="bg-primary text-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa fa-leaf text-2xl"></i>
                <h1 class="text-xl font-bold">黑水虻养殖管理系统</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-blue-700 transition-all">
                    <i class="fa fa-moon-o"></i>
                </button>
                <div class="relative">
                    <button id="user-menu" class="flex items-center space-x-1 p-2 rounded hover:bg-blue-700 transition-all">
                        <span>用户</span>
                        <i class="fa fa-caret-down"></i>
                    </button>
                    <div id="user-dropdown" class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-10 hidden">
                        <a href="#" id="login-btn" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">登录</a>
                        <a href="#" id="register-btn" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">注册</a>
                        <a href="#" id="logout" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hidden">退出登录</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="container mx-auto px-4 py-6 ml-64">
        <!-- 系统概览卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
            <div class="bg-white rounded-lg shadow-md p-6 border-l-4 border-blue-500">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-sm text-gray-500 font-medium">当前种虫数量</p>
                        <p class="text-2xl font-bold text-gray-800" id="total-larvae">0</p>
                    </div>
                    <div class="bg-blue-100 p-3 rounded-full">
                        <i class="fa fa-bug text-blue-500 text-xl"></i>
                    </div>
                </div>
                <div class="mt-4 flex items-center text-sm">
                    <span class="text-green-500 flex items-center">
                        <i class="fa fa-arrow-up mr-1"></i>
                        <span id="larvae-increase">0%</span>
                    </span>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6 border-l-4 border-green-500">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-sm text-gray-500 font-medium">虫卵总产量</p>
                        <p class="text-2xl font-bold text-gray-800" id="total-eggs">0</p>
                    </div>
                    <div class="bg-green-100 p-3 rounded-full">
                        <i class="fa fa-egg text-green-500 text-xl"></i>
                    </div>
                </div>
                <div class="mt-4 flex items-center text-sm">
                    <span class="text-green-500 flex items-center">
                        <i class="fa fa-arrow-up mr-1"></i>
                        <span id="eggs-increase">0%</span>
                    </span>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6 border-l-4 border-yellow-500">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-sm text-gray-500 font-medium">料虫比</p>
                        <p class="text-2xl font-bold text-gray-800" id="feed-ratio">0</p>
                    </div>
                    <div class="bg-yellow-100 p-3 rounded-full">
                        <i class="fa fa-balance-scale text-yellow-500 text-xl"></i>
                    </div>
                </div>
                <div class="mt-4 flex items-center text-sm">
                    <span class="text-green-500 flex items-center">
                        <i class="fa fa-arrow-down mr-1"></i>
                        <span id="feed-ratio-decrease">0%</span>
                    </span>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6 border-l-4 border-purple-500">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-sm text-gray-500 font-medium">虫卵比</p>
                        <p class="text-2xl font-bold text-gray-800" id="egg-ratio">0%</p>
                    </div>
                    <div class="bg-purple-100 p-3 rounded-full">
                        <i class="fa fa-percent text-purple-500 text-xl"></i>
                    </div>
                </div>
                <div class="mt-4 flex items-center text-sm">
                    <span class="text-green-500 flex items-center">
                        <i class="fa fa-arrow-up mr-1"></i>
                        <span id="egg-ratio-increase">0%</span>
                    </span>
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-lg font-semibold mb-4">养殖趋势</h3>
                <div class="h-64">
                    <canvas id="breeding-chart"></canvas>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-lg font-semibold mb-4">孵化趋势</h3>
                <div class="h-64">
                    <canvas id="hatching-chart"></canvas>
                </div>
            </div>
        </div>

        <!-- 快速操作按钮 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <button id="add-pool-btn" class="bg-blue-500 hover:bg-blue-600 text-white p-4 rounded-lg shadow flex flex-col items-center transition-all">
                <i class="fa fa-plus-circle text-2xl mb-2"></i>
                <span>添加养殖池</span>
            </button>
            <button id="add-feeding-btn" class="bg-green-500 hover:bg-green-600 text-white p-4 rounded-lg shadow flex flex-col items-center transition-all">
                <i class="fa fa-cutlery text-2xl mb-2"></i>
                <span>添加投料记录</span>
            </button>
            <button id="add-output-btn" class="bg-yellow-500 hover:bg-yellow-600 text-white p-4 rounded-lg shadow flex flex-col items-center transition-all">
                <i class="fa fa-download text-2xl mb-2"></i>
                <span>添加产出记录</span>
            </button>
            <button id="settings-btn" class="bg-purple-500 hover:bg-purple-600 text-white p-4 rounded-lg shadow flex flex-col items-center transition-all">
                <i class="fa fa-cog text-2xl mb-2"></i>
                <span>系统设置</span>
            </button>
        </div>
    </div>

    <!-- 侧边导航栏 -->
    <div class="fixed left-0 top-16 bottom-0 w-64 bg-white shadow-md z-10">
        <div class="p-4">
            <h2 class="text-lg font-semibold mb-4">功能菜单</h2>
            <ul>
                <li class="mb-2">
                    <a href="#" id="dashboard-link" class="flex items-center p-2 rounded-md bg-blue-50 text-blue-600">
                        <span>系统概览</span>
                    </a>
                </li>
                <li class="mb-2">
                    <a href="#" id="breeding-link" class="flex items-center p-2 rounded-md hover:bg-gray-100">
                        <span>种虫养殖</span>
                    </a>
                </li>
                <li class="mb-2">
                    <a href="#" id="hatching-link" class="flex items-center p-2 rounded-md hover:bg-gray-100">
                        <span>虫卵孵化</span>
                    </a>
                </li>
                <li class="mb-2">
                    <a href="#" id="feed-link" class="flex items-center p-2 rounded-md hover:bg-gray-100">
                        <span>饲料管理</span>
                    </a>
                </li>
                <li class="mb-2">
                    <a href="#" id="output-link" class="flex items-center p-2 rounded-md hover:bg-gray-100">
                        <span>产出管理</span>
                    </a>
                </li>
                <li class="mb-2">
                    <a href="#" id="user-management-link" class="flex items-center p-2 rounded-md hover:bg-gray-100">
                        <span>用户管理</span>
                    </a>
                </li>
                <li class="mb-2">
                    <a href="#" id="settings-link" class="flex items-center p-2 rounded-md hover:bg-gray-100">
                        <span>系统设置</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- 模态框 -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
            <div class="p-4 border-b flex justify-between items-center">
                <h3 id="modal-title" class="text-lg font-semibold"></h3>
                <button id="close-modal" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        // 全局变量
        let users = JSON.parse(localStorage.getItem('users')) || [
            { id: 1, username: 'admin', password: 'admin123', phone: '13800138000', role: 'admin', realName: '管理员' },
            { id: 2, username: 'user1', password: 'user123', phone: '13900139000', role: 'user', realName: '普通用户' }
        ];
        let pools = JSON.parse(localStorage.getItem('pools')) || [];
        let feedingRecords = JSON.parse(localStorage.getItem('feedingRecords')) || [];
        let outputRecords = JSON.parse(localStorage.getItem('outputRecords')) || [];
        let incubators = JSON.parse(localStorage.getItem('incubators')) || [];
        let ovipositionRooms = JSON.parse(localStorage.getItem('ovipositionRooms')) || [];
        let larvaeRecords = JSON.parse(localStorage.getItem('larvaeRecords')) || [];
        let pupaInRecords = JSON.parse(localStorage.getItem('pupaInRecords')) || [];
        let pupaOutRecords = JSON.parse(localStorage.getItem('pupaOutRecords')) || [];
        let ovipositionInRecords = JSON.parse(localStorage.getItem('ovipositionInRecords')) || [];
        let ovipositionOutRecords = JSON.parse(localStorage.getItem('ovipositionOutRecords')) || [];
        let settings = JSON.parse(localStorage.getItem('settings')) || {
            farmName: '黑水虻养殖场',
            contactPerson: '管理员',
            contactPhone: '13800138000',
            address: '某某省某某市某某区',
            temperatureRange: '25-30',
            humidityRange: '60-70'
        };

        // 保存数据到本地存储
        function saveData() {
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('pools', JSON.stringify(pools));
            localStorage.setItem('feedingRecords', JSON.stringify(feedingRecords));
            localStorage.setItem('outputRecords', JSON.stringify(outputRecords));
            localStorage.setItem('incubators', JSON.stringify(incubators));
            localStorage.setItem('ovipositionRooms', JSON.stringify(ovipositionRooms));
            localStorage.setItem('larvaeRecords', JSON.stringify(larvaeRecords));
            localStorage.setItem('pupaInRecords', JSON.stringify(pupaInRecords));
            localStorage.setItem('pupaOutRecords', JSON.stringify(pupaOutRecords));
            localStorage.setItem('ovipositionInRecords', JSON.stringify(ovipositionInRecords));
            localStorage.setItem('ovipositionOutRecords', JSON.stringify(ovipositionOutRecords));
            localStorage.setItem('settings', JSON.stringify(settings));
        }

        // 模态框功能
        function openModal(title, content, type) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        // 关闭模态框
        document.getElementById('close-modal').addEventListener('click', closeModal);

        // 点击模态框外部关闭
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 登录功能
        function openLoginForm() {
            let loginHTML = `
                <div class="p-6">
                    <h2 class="text-xl font-bold text-center mb-6">用户登录</h2>
                    <form id="login-form">
                        <div class="mb-4">
                            <label for="login-phone" class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
                            <input type="tel" id="login-phone" name="phone" required class="w-full border rounded-md px-3 py-2 text-sm">
                        </div>
                        <div class="mb-4">
                            <label for="login-password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                            <input type="password" id="login-password" name="password" required class="w-full border rounded-md px-3 py-2 text-sm">
                        </div>
                        <div class="flex items-center mb-6">
                            <input type="checkbox" id="remember-me" class="h-4 w-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                            <label for="remember-me" class="ml-2 block text-sm text-gray-700">记住我</label>
                        </div>
                        <div class="flex justify-center space-x-4">
                            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-md text-sm">登录</button>
                            <button type="button" onclick="closeModal()" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-md text-sm">取消</button>
                        </div>
                        <div class="mt-4 text-center">
                            <p class="text-sm text-gray-600">还没有账号？ <a href="#" id="go-to-register" class="text-blue-600 hover:text-blue-800">立即注册</a></p>
                        </div>
                    </form>
                </div>
            `;

            openModal('用户登录', loginHTML, 'login');

            document.getElementById('login-form').addEventListener('submit', function(e) {
                e.preventDefault();
                login();
            });

            document.getElementById('go-to-register').addEventListener('click', function(e) {
                e.preventDefault();
                closeModal();
                openRegisterForm();
            });
        }

        function login() {
            const phone = document.getElementById('login-phone').value;
            const password = document.getElementById('login-password').value;
            const rememberMe = document.getElementById('remember-me').checked;

            // 查找用户
            const user = users.find(u => u.phone === phone && u.password === password);
            
            if (user) {
                // 保存登录状态
                localStorage.setItem('currentUser', JSON.stringify(user));
                if (rememberMe) {
                    localStorage.setItem('rememberMe', 'true');
                } else {
                    localStorage.removeItem('rememberMe');
                }
                alert('登录成功！');
                closeModal();
                // 更新登录状态
                checkLoginStatus();
            } else {
                alert('手机号或密码错误！');
            }
        }

        // 注册功能
        function openRegisterForm() {
            let registerHTML = `
                <div class="p-6">
                    <h2 class="text-xl font-bold text-center mb-6">用户注册</h2>
                    <form id="register-form">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <div>
                                <label for="register-username" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                                <input type="text" id="register-username" name="username" required class="w-full border rounded-md px-3 py-2 text-sm">
                            </div>
                            <div>
                                <label for="register-phone" class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
                                <input type="tel" id="register-phone" name="phone" required class="w-full border rounded-md px-3 py-2 text-sm">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="register-password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                            <input type="password" id="register-password" name="password" required class="w-full border rounded-md px-3 py-2 text-sm">
                        </div>
                        <div class="mb-4">
                            <label for="register-confirm-password" class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                            <input type="password" id="register-confirm-password" name="confirm-password" required class="w-full border rounded-md px-3 py-2 text-sm">
                        </div>
                        <div class="mb-4">
                            <label for="register-real-name" class="block text-sm font-medium text-gray-700 mb-1">真实姓名</label>
                            <input type="text" id="register-real-name" name="real-name" required class="w-full border rounded-md px-3 py-2 text-sm">
                        </div>
                        <div class="flex justify-center space-x-4">
                            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-md text-sm">注册</button>
                            <button type="button" onclick="closeModal()" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-md text-sm">取消</button>
                        </div>
                        <div class="mt-4 text-center">
                            <p class="text-sm text-gray-600">已有账号？ <a href="#" id="go-to-login" class="text-blue-600 hover:text-blue-800">立即登录</a></p>
                        </div>
                    </form>
                </div>
            `;

            openModal('用户注册', registerHTML, 'register');

            document.getElementById('register-form').addEventListener('submit', function(e) {
                e.preventDefault();
                register();
            });

            document.getElementById('go-to-login').addEventListener('click', function(e) {
                e.preventDefault();
                closeModal();
                openLoginForm();
            });
        }

        function register() {
            const username = document.getElementById('register-username').value;
            const phone = document.getElementById('register-phone').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            const realName = document.getElementById('register-real-name').value;

            // 验证密码
            if (password !== confirmPassword) {
                alert('两次输入的密码不一致！');
                return;
            }

            // 检查手机号是否已存在
            if (users.some(user => user.phone === phone)) {
                alert('手机号已被注册！');
                return;
            }

            // 检查用户名是否已存在
            if (users.some(user => user.username === username)) {
                alert('用户名已存在！');
                return;
            }

            const newUser = {
                id: Date.now(),
                username,
                password,
                phone,
                role: 'user',
                realName
            };

            users.push(newUser);
            saveData();
            alert('注册成功！');
            closeModal();
            openLoginForm();
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                // 清除登录状态
                localStorage.removeItem('currentUser');
                localStorage.removeItem('rememberMe');
                alert('您已成功退出登录！');
                // 更新登录状态
                checkLoginStatus();
            }
        }

        // 用户管理功能
        function openUserManagement() {
            renderUserList();
        }

        function renderUserList() {
            let userHTML = `
                <div class="p-6">
                    <h2 class="text-xl font-bold text-center mb-6">用户管理</h2>
                    <div class="flex justify-between mb-4">
                        <button id="add-user-btn" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-md text-sm flex items-center">
                            <i class="fa fa-plus mr-2"></i>添加用户
                        </button>
                        <div class="flex space-x-2">
                            <button onclick="openLoginForm()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-md text-sm flex items-center">
                                <i class="fa fa-sign-in mr-2"></i>登录
                            </button>
                            <button onclick="openRegisterForm()" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-md text-sm flex items-center">
                                <i class="fa fa-user-plus mr-2"></i>注册
                            </button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200 border">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border">用户名</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border">手机号</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border">真实姓名</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border">角色</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border">操作</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
            `;

            users.forEach(user => {
                userHTML += `
                    <tr>
                        <td class="px-4 py-2 whitespace-nowrap text-sm border">${user.username}</td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm border">${user.phone}</td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm border">${user.realName}</td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm border">${user.role === 'admin' ? '管理员' : '普通用户'}</td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm border">
                            <button onclick="editUser(${user.id})" class="text-blue-600 hover:text-blue-900 mr-3">编辑</button>
                            <button onclick="deleteUser(${user.id})" class="text-red-600 hover:text-red-900">删除</button>
                        </td>
                    </tr>
                `;
            });

            userHTML += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            openModal('用户管理', userHTML, 'user-management');

            document.getElementById('add-user-btn').addEventListener('click', addUserForm);
        }

        function addUserForm() {
            let addUserHTML = `
                <div class="p-6">
                    <h2 class="text-xl font-bold text-center mb-6">添加用户</h2>
                    <form id="add-user-form">

        function addUser() {
            const username = document.getElementById('new-username').value;
            const phone = document.getElementById('new-phone').value;
            const password = document.getElementById('new-password').value;
            const realName = document.getElementById('new-real-name').value;
            const role = document.getElementById('new-role').value;

            // 检查用户名是否已存在
            if (users.some(user => user.username === username)) {
                alert('用户名已存在！');
                return;
            }

            // 检查手机号是否已存在
            if (users.some(user => user.phone === phone)) {
                alert('手机号已被注册！');
                return;
            }

            const newUser = {
                id: Date.now(),
                username,
                password,
                phone,
                role,
                realName
            };

            users.push(newUser);
            saveData();
            alert('用户添加成功！');
            closeModal();
            renderUserList();
        }

        function updateUser() {
            const userId = parseInt(document.getElementById('edit-user-id').value);
            const username = document.getElementById('edit-username').value;
            const phone = document.getElementById('edit-phone').value;
            const password = document.getElementById('edit-password').value;
            const realName = document.getElementById('edit-real-name').value;
            const role = document.getElementById('edit-role').value;

            const userIndex = users.findIndex(u => u.id === userId);
            if (userIndex === -1) return;

            // 检查用户名是否与其他用户重复
            if (users.some((u, index) => u.username === username && index !== userIndex)) {
                alert('用户名已存在！');
                return;
            }

            // 检查手机号是否与其他用户重复
            if (users.some((u, index) => u.phone === phone && index !== userIndex)) {
                alert('手机号已被注册！');
                return;
            }

            users[userIndex] = {
                ...users[userIndex],
                username,
                phone,
                realName,
                role,
                ...(password ? { password } : {})
            };

            saveData();
            alert('用户信息更新成功！');
            closeModal();
            renderUserList();
        }

        function deleteUser(userId) {
            if (confirm('确定要删除该用户吗？')) {
                users = users.filter(u => u.id !== userId);

        }

        // 更新概览数据
        function updateOverviewData() {
            // 计算当前种虫数量
            const totalLarvae = outputRecords.reduce((sum, record) => sum + record.amount, 0);
            document.getElementById('total-larvae').textContent = totalLarvae.toFixed(1);

            // 计算虫卵总产量
            const totalEggs = ovipositionOutRecords.reduce((sum, record) => sum + record.amount, 0);
            document.getElementById('total-eggs').textContent = totalEggs.toFixed(1);

            // 计算料虫比
            const totalFeed = feedingRecords.reduce((sum, record) => sum + record.amount, 0);
            const feedRatio = totalLarvae > 0 ? totalFeed / totalLarvae : 0;
            document.getElementById('feed-ratio').textContent = feedRatio.toFixed(2);

            // 计算虫卵比
            const totalPupa = pupaOutRecords.reduce((sum, record) => sum + record.amount, 0);
            const eggRatio = totalPupa > 0 ? (totalEggs / totalPupa * 100) : 0;
            document.getElementById('egg-ratio').textContent = eggRatio.toFixed(2) + '%';

            // 设置增减百分比（模拟数据）
            document.getElementById('larvae-increase').textContent = '12.5%';
            document.getElementById('eggs-increase').textContent = '8.3%';
            document.getElementById('feed-ratio-decrease').textContent = '5.2%';
            document.getElementById('egg-ratio-increase').textContent = '0.2%';
        }

        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 设置当前日期
            const today = new Date().toISOString().split('T')[0];
            document.querySelectorAll('input[type="date"]').forEach(input => {
                input.value = today;
            });

            // 初始化图表
            initCharts();

            // 绑定事件
            bindEvents();

            // 加载数据
            loadData();

            // 检查登录状态
            checkLoginStatus();
        });
    </script>
</body>
</html>
